# mprocs process layout for xRSPS dev.
#
# Run: `bun run dev` (or `mprocs` directly from the repo root).
#
# Three tabs come up together:
#   1. server     — the game server (binary WS on 43594) via bun
#   2. client     — the React dev server (craco start) on :3000
#   3. agent-dev  — launcher: self-generates a stable agent identity,
#                   waits for the client dev server, then opens the
#                   system browser at
#                     http://localhost:3000/?username=...&password=...&autoplay=1
#                   which triggers the client's auto-login + the
#                   in-browser autoplay loop. ONE browser, ONE
#                   character: the user and the agent share it.
#
# The agent's identity (name + password) is persisted to
# `server/data/dev-agent-identity.json`, so skills / inventory /
# position accumulate across sessions.
#
# Navigation:
#   Ctrl-A then tab → cycle procs
#   Ctrl-A then ↓/↑ → focus next/prev proc
#   Ctrl-A then r  → restart focused proc
#   Ctrl-A then s  → stop focused proc
#   Ctrl-A then x  → start a stopped proc
#   Ctrl-A then q  → quit mprocs (stops all procs)
#
# Full keymap: https://github.com/pvolok/mprocs#keymap

procs:
  server:
    shell: "bun run server:start"
    autostart: true

  client:
    # craco compiles in the foreground. BROWSER=none suppresses CRA's
    # own auto-open so the agent-dev tab can open the browser with the
    # auto-login + autoplay query params.
    shell: "BROWSER=none bun run start"
    autostart: true

  agent-dev:
    shell: "bun scripts/agent-dev.ts"
    autostart: true

hide_keymap_window: false
